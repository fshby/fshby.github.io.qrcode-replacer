<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码替换测试</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1000px; margin: 20px auto; padding: 20px; }
    .container { display: flex; gap: 20px; margin-bottom: 20px; }
    .image-box { flex: 1; border: 2px solid #ddd; border-radius: 8px; padding: 10px; text-align: center; }
    img { max-width: 100%; max-height: 400px; object-fit: contain; }
    button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #2563eb; }
    .result { margin-top: 20px; border: 2px solid #10b981; border-radius: 8px; padding: 10px; }
    .log { background: #f5f5f5; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
    .log p { margin: 2px 0; }
    .log .error { color: #ef4444; }
    .log .success { color: #10b981; }
    .log .info { color: #3b82f6; }
  </style>
</head>
<body>
  <h1>二维码替换测试</h1>
  
  <div class="container">
    <div class="image-box">
      <h3>模板图片</h3>
      <input type="file" id="template-input" accept="image/*" onchange="loadTemplate()">
      <div id="template-preview"></div>
    </div>
    <div class="image-box">
      <h3>二维码图片</h3>
      <input type="file" id="qr-input" accept="image/*" onchange="loadQR()">
      <div id="qr-preview"></div>
    </div>
  </div>
  
  <button onclick="runTest()">开始测试</button>
  
  <div class="result" id="result-container"></div>
  
  <div class="log" id="log-container"></div>

  <script type="module">
    import jsQR from 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/+esm'
    
    const templateCanvas = document.createElement('canvas')
    const qrCanvas = document.createElement('canvas')
    let detectedCorners = null
    
    function log(msg, type = 'info') {
      const container = document.getElementById('log-container')
      const p = document.createElement('p')
      p.className = type
      p.textContent = msg
      container.appendChild(p)
      container.scrollTop = container.scrollHeight
    }
    
    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image()
        img.crossOrigin = 'anonymous'
        img.onload = () => resolve(img)
        img.onerror = () => reject(new Error('图片加载失败'))
        img.src = url
      })
    }
    
    async function loadTemplate() {
      const input = document.getElementById('template-input')
      if (!input.files) return
      
      const url = URL.createObjectURL(input.files[0])
      const img = await loadImage(url)
      
      templateCanvas.width = img.width
      templateCanvas.height = img.height
      const ctx = templateCanvas.getContext('2d')
      ctx.drawImage(img, 0, 0)
      
      const preview = document.getElementById('template-preview')
      preview.innerHTML = `<img src="${url}" alt="模板图片">`
      preview.appendChild(templateCanvas)
      templateCanvas.style.maxWidth = '100%'
      templateCanvas.style.maxHeight = '400px'
      
      log(`模板加载: ${img.width} x ${img.height}`, 'success')
    }
    
    async function loadQR() {
      const input = document.getElementById('qr-input')
      if (!input.files) return
      
      const url = URL.createObjectURL(input.files[0])
      const img = await loadImage(url)
      
      qrCanvas.width = img.width
      qrCanvas.height = img.height
      const ctx = qrCanvas.getContext('2d')
      ctx.drawImage(img, 0, 0)
      
      const preview = document.getElementById('qr-preview')
      preview.innerHTML = `<img src="${url}" alt="二维码图片">`
      
      log(`二维码加载: ${img.width} x ${img.height}`, 'success')
    }
    
    function sortCorners(corners) {
      const sorted = [...corners].sort((a, b) => {
        if (Math.abs(a.y - b.y) < 10) return a.x - b.x
        return a.y - b.y
      })
      const topTwo = sorted.slice(0, 2).sort((a, b) => a.x - b.x)
      const bottomTwo = sorted.slice(2, 4).sort((a, b) => a.x - b.x)
      return {
        topLeft: topTwo[0],
        topRight: topTwo[1],
        bottomLeft: bottomTwo[0],
        bottomRight: bottomTwo[1]
      }
    }
    
    function detectQRCode(canvas) {
      const ctx = canvas.getContext('2d')
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height)
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'attemptBoth'
      })
      if (!code) return null
      
      const allCorners = [
        { x: code.location.topLeftCorner.x, y: code.location.topLeftCorner.y },
        { x: code.location.topRightCorner.x, y: code.location.topRightCorner.y },
        { x: code.location.bottomLeftCorner.x, y: code.location.bottomLeftCorner.y },
        { x: code.location.bottomRightCorner.x, y: code.location.bottomRightCorner.y }
      ]
      return sortCorners(allCorners)
    }
    
    function drawCorners(canvas, corners, color = 'red') {
      const ctx = canvas.getContext('2d')
      ctx.strokeStyle = color
      ctx.lineWidth = 3
      ctx.fillStyle = color
      
      const points = [corners.topLeft, corners.topRight, corners.bottomRight, corners.bottomLeft]
      
      ctx.beginPath()
      ctx.moveTo(points[0].x, points[0].y)
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y)
      }
      ctx.closePath()
      ctx.stroke()
      
      points.forEach(point => {
        ctx.beginPath()
        ctx.arc(point.x, point.y, 8, 0, Math.PI * 2)
        ctx.fill()
      })
    }
    
    function computeHomography(srcPoints, dstPoints) {
      const A = []
      for (let i = 0; i < 4; i++) {
        const [x, y] = [srcPoints[i].x, srcPoints[i].y]
        const [u, v] = [dstPoints[i].x, dstPoints[i].y]
        A.push([x, y, 1, 0, 0, 0, -u * x, -u * y, -u])
        A.push([0, 0, 0, x, y, 1, -v * x, -v * y, -v])
      }
      
      const At = A[0].map((_, i) => A.map(row => row[i]))
      const AtA = At.map(row => 
        row.map((_, i) => 
          row.reduce((sum, val, j) => sum + val * A[j][i], 0)
        )
      )
      
      const n = AtA.length
      for (let i = 0; i < n; i++) {
        let maxRow = i
        for (let k = i + 1; k < n; k++) {
          if (Math.abs(AtA[k][i]) > Math.abs(AtA[maxRow][i])) maxRow = k
        }
        ;[AtA[i], AtA[maxRow]] = [AtA[maxRow], AtA[i]]
        
        for (let k = i + 1; k < n; k++) {
          const c = AtA[k][i] / AtA[i][i]
          for (let j = i; j < n; j++) {
            AtA[k][j] -= c * AtA[i][j]
          }
        }
      }
      
      const H = new Array(n).fill(0)
      for (let i = n - 1; i >= 0; i--) {
        H[i] = AtA[i][n - 1] / AtA[i][i]
        for (let k = i - 1; k >= 0; k--) {
          AtA[k][n - 1] -= AtA[k][i] * H[i]
        }
      }
      
      const norm = H[8] || 1
      return H.map(h => h / norm)
    }
    
    function applyHomography(H, x, y) {
      const denom = H[6] * x + H[7] * y + H[8]
      if (Math.abs(denom) < 1e-10) return [x, y]
      return [
        (H[0] * x + H[1] * y + H[2]) / denom,
        (H[3] * x + H[4] * y + H[5]) / denom
      ]
    }
    
    function bilinearInterpolate(imageData, x, y) {
      const width = imageData.width
      const x0 = Math.floor(x)
      const x1 = Math.min(x0 + 1, width - 1)
      const y0 = Math.floor(y)
      const y1 = Math.min(y0 + 1, imageData.height - 1)
      
      const wx = x - x0
      const wy = y - y0
      
      const idx00 = (y0 * width + x0) * 4
      const idx10 = (y0 * width + x1) * 4
      const idx01 = (y1 * width + x0) * 4
      const idx11 = (y1 * width + x1) * 4
      
      return {
        r: Math.round(
          imageData.data[idx00] * (1 - wx) * (1 - wy) +
          imageData.data[idx10] * wx * (1 - wy) +
          imageData.data[idx01] * (1 - wx) * wy +
          imageData.data[idx11] * wx * wy
        ),
        g: Math.round(
          imageData.data[idx00 + 1] * (1 - wx) * (1 - wy) +
          imageData.data[idx10 + 1] * wx * (1 - wy) +
          imageData.data[idx01 + 1] * (1 - wx) * wy +
          imageData.data[idx11 + 1] * wx * wy
        ),
        b: Math.round(
          imageData.data[idx00 + 2] * (1 - wx) * (1 - wy) +
          imageData.data[idx10 + 2] * wx * (1 - wy) +
          imageData.data[idx01 + 2] * (1 - wx) * wy +
          imageData.data[idx11 + 2] * wx * wy
        ),
        a: 255
      }
    }
    
    function compositeImage(templateCanvas, qrCanvas, dstCorners) {
      const ctx = templateCanvas.getContext('2d')
      const qrCtx = qrCanvas.getContext('2d')
      
      const qrImageData = qrCtx.getImageData(0, 0, qrCanvas.width, qrCanvas.height)
      const qrW = qrCanvas.width
      const qrH = qrCanvas.height
      
      log(`二维码尺寸: ${qrW} x ${qrH}`)
      
      const srcCorners = [
        { x: 0, y: 0 },
        { x: qrW, y: 0 },
        { x: qrW, y: qrH },
        { x: 0, y: qrH }
      ]
      
      log(`源角点: ${JSON.stringify(srcCorners)}`)
      log(`目标角点: ${JSON.stringify(dstCorners)}`)
      
      const H = computeHomography(srcCorners, dstCorners)
      log(`单应性矩阵: ${H.join(', ')}`)
      
      const xs = dstCorners.map(p => p.x)
      const ys = dstCorners.map(p => p.y)
      const minX = Math.max(0, Math.floor(Math.min(...xs)))
      const maxX = Math.min(templateCanvas.width, Math.ceil(Math.max(...xs)))
      const minY = Math.max(0, Math.floor(Math.min(...ys)))
      const maxY = Math.min(templateCanvas.height, Math.ceil(Math.max(...ys)))
      
      log(`目标区域: [${minX}, ${minY}] - [${maxX}, ${maxY}]`)
      
      const width = maxX - minX
      const height = maxY - minY
      
      if (width <= 0 || height <= 0) {
        throw new Error(`目标区域无效: ${width} x ${height}`)
      }
      
      const imageData = ctx.getImageData(minX, minY, width, height)
      let pixelCount = 0
      
      for (let y = minY; y < maxY; y++) {
        for (let x = minX; x < maxX; x++) {
          const [sx, sy] = applyHomography(H, x, y)
          if (sx >= 0 && sx < qrW && sy >= 0 && sy < qrH) {
            const color = bilinearInterpolate(qrImageData, sx, sy)
            const idx = ((y - minY) * width + (x - minX)) * 4
            imageData.data[idx] = color.r
            imageData.data[idx + 1] = color.g
            imageData.data[idx + 2] = color.b
            imageData.data[idx + 3] = 255
            pixelCount++
          }
        }
      }
      
      log(`合成完成: ${pixelCount} 像素写入`, 'success')
      ctx.putImageData(imageData, minX, minY)
    }
    
    async function runTest() {
      document.getElementById('log-container').innerHTML = ''
      document.getElementById('result-container').innerHTML = ''
      
      log('=== 开始测试 ===')
      
      if (templateCanvas.width === 0) {
        log('请先加载模板图片', 'error')
        return
      }
      
      if (qrCanvas.width === 0) {
        log('请先加载二维码图片', 'error')
        return
      }
      
      log('\n步骤1: 检测二维码')
      const corners = detectQRCode(templateCanvas)
      
      if (corners) {
        log('检测成功!', 'success')
        log('检测到的角点:', 'info')
        log(`  topLeft: (${corners.topLeft.x.toFixed(1)}, ${corners.topLeft.y.toFixed(1)})`)
        log(`  topRight: (${corners.topRight.x.toFixed(1)}, ${corners.topRight.y.toFixed(1)})`)
        log(`  bottomLeft: (${corners.bottomLeft.x.toFixed(1)}, ${corners.bottomLeft.y.toFixed(1)})`)
        log(`  bottomRight: (${corners.bottomRight.x.toFixed(1)}, ${corners.bottomRight.y.toFixed(1)})`)
        drawCorners(templateCanvas, corners, 'red')
        detectedCorners = corners
      } else {
        log('检测失败，使用默认角点', 'error')
        const margin = 50
        detectedCorners = {
          topLeft: { x: margin, y: margin },
          topRight: { x: templateCanvas.width - margin, y: margin },
          bottomLeft: { x: margin, y: templateCanvas.height - margin },
          bottomRight: { x: templateCanvas.width - margin, y: templateCanvas.height - margin }
        }
        log('默认角点:', 'info')
        log(`  topLeft: (${detectedCorners.topLeft.x}, ${detectedCorners.topLeft.y})`)
        log(`  topRight: (${detectedCorners.topRight.x}, ${detectedCorners.topRight.y})`)
        log(`  bottomLeft: (${detectedCorners.bottomLeft.x}, ${detectedCorners.bottomLeft.y})`)
        log(`  bottomRight: (${detectedCorners.bottomRight.x}, ${detectedCorners.bottomRight.y})`)
        drawCorners(templateCanvas, detectedCorners, 'blue')
      }
      
      const dstCorners = [
        detectedCorners.topLeft,
        detectedCorners.topRight,
        detectedCorners.bottomRight,
        detectedCorners.bottomLeft
      ]
      
      log('\n步骤2: 合成图片')
      try {
        compositeImage(templateCanvas, qrCanvas, dstCorners)
        
        const resultDataUrl = templateCanvas.toDataURL('image/png')
        const resultImg = document.createElement('img')
        resultImg.src = resultDataUrl
        resultImg.style.maxWidth = '100%'
        resultImg.style.maxHeight = '500px'
        
        const container = document.getElementById('result-container')
        container.innerHTML = '<h3>合成结果:</h3>'
        container.appendChild(resultImg)
        
        log('\n测试完成!', 'success')
      } catch (err) {
        log(`错误: ${err.message}`, 'error')
        console.error(err)
      }
    }
  </script>
</body>
</html>
